name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  DOCKER_USER: ajaygangwar945
  IMAGE_NAME: hadoop-learning-portal

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t $DOCKER_USER/$IMAGE_NAME:latest \
          -t $DOCKER_USER/$IMAGE_NAME:${{ github.run_number }} .

      - name: Push Latest Tag
        run: |
          docker push $DOCKER_USER/$IMAGE_NAME:latest

      - name: Push Build Number Tag
        run: |
          docker push $DOCKER_USER/$IMAGE_NAME:${{ github.run_number }}

      - name: Show Image Tags
        run: |
          echo "Latest Tag  : latest"
          echo "Version Tag : ${{ github.run_number }}"      